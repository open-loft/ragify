services:
  mongo:
    image: mongo:7.0.20
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:7.4.2-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data

  qdrant:
    image: qdrant/qdrant:v1.13.6
    restart: unless-stopped
    volumes:
      - qdrant-data:/qdrant/storage

  backend:
    build: .
    env_file: .env
    environment:
      PORT: 8000
      STORAGE_PATH: /app/uploads
      MONGODB_URI: mongodb://mongo:27017/rag-chatbot
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
    init: true
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - uploads-data:/app/uploads
    depends_on:
      - mongo
      - redis
      - qdrant

  worker:
    build: .
    env_file: .env
    environment:
      STORAGE_PATH: /app/uploads
      MONGODB_URI: mongodb://mongo:27017/rag-chatbot
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
    command: ["node", "dist/worker/ingestWorker.js"]
    init: true
    restart: unless-stopped
    healthcheck:
      disable: true
    volumes:
      - uploads-data:/app/uploads
    depends_on:
      - mongo
      - redis
      - qdrant
      - backend

volumes:
  mongo-data:
  redis-data:
  qdrant-data:
  uploads-data:
