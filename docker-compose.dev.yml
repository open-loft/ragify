services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: backend-app-dev
    command: npm run dev
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - /app/node_modules
      - ./uploads:/app/uploads
    env_file:
      - .env
    environment:
      PORT: 8000
      STORAGE_PATH: /app/uploads
      MONGODB_URI: mongodb://mongo:27017/rag-chatbot
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
    depends_on:
      - mongo
      - redis
      - qdrant
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8000/').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: backend-worker-dev
    command: npm run worker:ts
    volumes:
      - .:/app
      - /app/node_modules
      - ./uploads:/app/uploads
    env_file:
      - .env
    environment:
      STORAGE_PATH: /app/uploads
      MONGODB_URI: mongodb://mongo:27017/rag-chatbot
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
    healthcheck:
      disable: true
    depends_on:
      - redis
      - mongo
      - qdrant
    restart: unless-stopped

  mongo:
    image: mongo:7.0.20
    ports:
      - "27017:27017"
    volumes:
      - ./data/mongo:/data/db
    restart: unless-stopped

  redis:
    image: redis:7.4.2-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ./data/redis:/data
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.13.6
    ports:
      - "6333:6333"
    volumes:
      - ./data/qdrant:/qdrant/storage
    restart: unless-stopped
